name: libroguelike

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
 build:
   runs-on: ubuntu-latest
   steps:
   - run:   |
            sudo apt update
            sudo apt install -y build-essential gcc clang valgrind
     shell: bash
   - name: checkout repo
     uses: actions/checkout@main
   - name: build application with default compiler (GCC)
     run: make -B
   - name: build application with clang
     run: make -B CC=clang
   - name: valgrind
     run:   |
            examples=(automata bsp dijkstra floodfill heap line maze minimal path rng)
            for f in "${examples[@]}"; do
              if ! ( ./valgrind ./examples/$f ); then
                exit 1
              fi
              if ( grep ' lost: ' valgrind-out.txt  | grep -v 'lost: 0 bytes' ); then
                exit 2
              fi
            done
     shell: bash
